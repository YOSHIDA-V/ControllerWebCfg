<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VS-C4 プリセット設定プレビュー</title>
    <link rel="icon" href="icon.png">
    <link rel="stylesheet" href="styles/main.css?v=vsc4-20260522-6">
  </head>
  <body>
    <img class="pageIcon" src="icon.png" alt="">
    <h1>VS-C4 プリセット設定</h1>
    <p class="availability">
      <a href="preview_index.html">Preview Index</a> |
      <a href="presets.html">通常ページ</a>
    </p>
    <main class="app-shell">
      <div class="doc-link-panel">
        <p class="banner-link"><a href="https://blueretro.com/products/brx"><img src="brx_banner.png" alt="BlueRetro"></a></p>
        <p>ドキュメント（Wiki）を参照してください:<br><a href="https://github.com/darthcloud/BlueRetro/wiki/BlueRetro-BLE-Web-Config-User-Manual#3---presets-page" target="_blank">3 - プリセットページ</a></p>
      </div>
      <div id="divBtConn">
        <button type="button">VS-C4に接続</button>
        <small><i>設定前にVS-C4からすべてのコントローラーを切断。</i></small>
        <div class="preview-actions">
          <a class="preview-button" href="presets.html">通常ページを開く</a>
        </div>
      </div>
      <div id="divInfo" style="display:block;">プレビュー表示: VS-C4未接続でもレイアウト確認中</div>
      <div id="divCfgSel" style="display:block;">
        <h2>設定選択</h2>
        <p>グローバル設定を使用</p>
      </div>
      <div id="divInputCfg" style="display:block;">
        <h2>プリセット設定</h2>
        <p id="desc">プリセットの選択画面を確認中</p>
        <outputandconsole>
          <span>
            <label>書き込み先</label>
            <select><option>Output 3</option></select>
          </span>
          <span>
            <label>本体</label>
            <select><option>All</option><option>PSX / PS2</option></select>
          </span>
          <span>
            <label>プリセット</label>
            <select><option>8bitdo Pro2/Pro3 -> PSX / PS2</option></select>
          </span>
        </outputandconsole>
        <button type="button">プリセットを書き込む</button>
      </div>
      <div id="output" class="output">
        <div class="outputHeader">
          <h3>処理ログ</h3>
          <button type="button">ログ消去</button>
        </div>
        <div id="content"></div>
        <div id="status"></div>
        <pre id="log">プレビュー用ログ</pre>
      </div>
    </main>
  </body>
</html>
