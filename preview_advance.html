<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VS-C4 詳細設定プレビュー</title>
    <link rel="icon" href="icon.png">
    <link rel="stylesheet" href="styles/main.css?v=vsc4-20260522-5">
  </head>
  <body>
    <img class="pageIcon" src="icon.png" alt="">
    <h1>VS-C4 詳細設定</h1>
    <p class="availability">
      <a href="preview_index.html">Preview Index</a> |
      <a href="advance.html">通常ページ</a>
    </p>
    <main class="app-shell">
      <div class="doc-link-panel">
        <p class="banner-link"><a href="https://blueretro.com/products/brx"><img src="brx_banner.png" alt="BlueRetro"></a></p>
        <p>ドキュメント（Wiki）を参照してください:<br><a href="https://github.com/darthcloud/BlueRetro/wiki/BlueRetro-BLE-Web-Config-User-Manual#2---advance-config-page" target="_blank">2 - 詳細設定ページ</a></p>
      </div>
      <div id="divBtConn">
        <button type="button">VS-C4に接続</button>
        <small><i>設定前にVS-C4からすべてのコントローラーを切断。</i></small>
        <div class="preview-actions">
          <a class="preview-button" href="advance.html">通常ページを開く</a>
        </div>
      </div>
      <div id="divInfo" style="display:block;">プレビュー表示: VS-C4未接続でもレイアウト確認中</div>
      <div id="divCfgSel" style="display:block;">
        <h2>設定選択</h2>
        <p>グローバル設定を使用</p>
      </div>
      <div id="divGlobalCfg" style="display:block;">
        <h2>グローバル設定</h2>
        <div>
          <label>システム</label>
          <select><option>SPI2 / PSX</option><option>SPI3 / PS2</option></select>
        </div>
        <div>
          <label>ペアリングモード</label>
          <select><option>Auto</option><option>ボタンペアリング</option></select>
        </div>
        <button type="button">グローバル設定を保存</button>
      </div>
      <div id="divOutputCfg" style="display:block;">
        <h2>出力設定</h2>
        <div>
          <label>モード</label>
          <select><option>GamePad</option></select>
        </div>
        <div>
          <label>アクセサリ</label>
          <select><option>なし</option><option>振動</option></select>
        </div>
        <button type="button">出力設定を保存</button>
      </div>
      <div id="divInputCfg" style="display:block;">
        <h2>マッピング設定</h2>
        <div>
          <label>入力コントローラ タイプ</label>
          <select><option>8bitdo Pro2/Pro3</option></select>
        </div>
        <div>
          <label>出力コントローラタイプ</label>
          <select><option>PSX / PS2</option></select>
        </div>
        <div class="mapping-display-options">
          <label><input type="checkbox"> デッドゾーン / スケーリングを表示</label>
          <small>通常は非表示です。保存される値は変わりません。</small>
        </div>
        <div id="divMapping" class="mapping-detail-hidden">
          <div class="mapping-column-header">
            <span>入力</span>
            <span>出力</span>
            <span class="mapping-deadzone">デッドゾーン</span>
            <span class="mapping-scaling">スケーリング</span>
            <span></span>
          </div>
          <div class="mapping-row">
            <span class="mapping-src"><select aria-label="入力"><option>右ボタン 左（GP RB Left / KB Q）</option></select></span>
            <span class="mapping-dest"><select aria-label="出力"><option>□</option></select></span>
            <span class="mapping-deadzone"><select aria-label="デッドゾーン"><option>0.0135%</option></select></span>
            <span class="mapping-scaling"><select aria-label="スケーリング"><option>リニア</option></select></span>
            <button type="button">削除</button>
          </div>
          <div class="mapping-row">
            <span class="mapping-src"><select aria-label="入力"><option>Home（GP MT / KB L Win）</option></select></span>
            <span class="mapping-dest"><select aria-label="出力"><option>□ / ○ / × / ▵</option></select></span>
            <span class="mapping-deadzone"><select aria-label="デッドゾーン"><option>0.0135%</option></select></span>
            <span class="mapping-scaling"><select aria-label="スケーリング"><option>リニア</option></select></span>
            <button type="button">削除</button>
          </div>
        </div>
        <button type="button" class="mapping-add-button">マッピングを追加</button>
        <button type="button">マッピングを保存</button>
      </div>
      <div id="output" class="output">
        <div class="outputHeader">
          <h3>処理ログ</h3>
          <button type="button">ログ消去</button>
        </div>
        <div id="content"></div>
        <div id="status"></div>
        <pre id="log">プレビュー用ログ</pre>
      </div>
    </main>
    <script>
      const mappingToggle = document.querySelector('.mapping-display-options input');
      const mappingPreview = document.getElementById('divMapping');
      if (mappingToggle && mappingPreview) {
        mappingToggle.addEventListener('change', () => {
          mappingPreview.classList.toggle('mapping-detail-hidden', !mappingToggle.checked);
        });
      }
    </script>
  </body>
</html>
